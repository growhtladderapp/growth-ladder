<head>

  <!-- Twitter -->

  <meta property="twitter:image" content="https://trainingwithhabits.app/hero-banner.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TrainingWithHabits",
      "operatingSystem": "Web, iOS, Android",
      "applicationCategory": "HealthApplication, FitnessApplication",
      "offers": {

        "price": "0",

      },
      "description": "Entrenador personal inteligente con gamificación, seguimiento de nutrición y coach IA 24/7.",
      "aggregateRating": {

        "ratingCount": "1000"

  <meta name="theme-color" content="#f97316" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          keyframes: {
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            'star-pop': {
              '0%':   { opacity: '0', transform: 'scale(0) rotate(-30deg)' },
              '25%':  { opacity: '1', transform: 'scale(1.3) rotate(0deg)' },
              '60%':  { opacity: '1', transform: 'scale(1) rotate(10deg)' },
              '100%': { opacity: '0', transform: 'scale(0.5) rotate(20deg)' },
            },
            'star-line': {
              '0%':   { opacity: '1', transform: 'scaleX(0)' },
              '30%':  { opacity: '1', transform: 'scaleX(1)' },
              '100%': { opacity: '0', transform: 'scaleX(1)' },
            },
          },
          animation: {
            'scroll': 'scroll 30s linear infinite',
            'scroll-slow': 'scroll 60s linear infinite',
            'star-pop': 'star-pop 0.8s ease forwards',
            'star-line': 'star-line 0.8s ease forwards',
          },
          colors: {
            brand: {
              50: '#fff7ed',
              100: '#ffedd5',
              500: 'var(--brand-500, #f97316)',
              600: 'var(--brand-600, #ea580c)',
              900: '#7c2d12',
              dark: 'var(--bg-main, #121212)',
              card: 'var(--bg-card, #1e1e1e)'
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --brand-500: #10b981; /* Verde esmeralda (Acento) */
      --brand-600: #059669; /* Verde oscuro */
      --bg-main: #000000;   /* Negro puro OLED */
      --bg-card: #1c1c1e;   /* Gris muy oscuro para las tarjetas */
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --border-main: #2c2c2e;
    }

    .light-mode {
      /* Colores para Modo Claro Invertido */
      --bg-main: #f8fafc; /* Fondo gris muy claro */
      --bg-card: #ffffff; /* Tarjetas blancas */
      --text-main: #0f172a; /* Texto oscuro principal */
      --text-muted: #64748b; /* Texto gris suave */
      --border-main: #e2e8f0; /* Bordes claros */
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .bg-brand-card {
      background-color: var(--bg-card) !important;
      border-color: var(--border-main) !important;
    }

    .light-mode .text-slate-100,
    .light-mode .text-zinc-100,
    .light-mode .text-white {
      color: var(--text-main) !important;
    }

    .light-mode .text-slate-400,
    .light-mode .text-slate-500,
    .light-mode .text-zinc-400,
    .light-mode .text-zinc-500,
    .light-mode .text-slate-300,
    .light-mode .text-zinc-300 {
      color: var(--text-muted) !important;
    }

    .light-mode .bg-black,
    .light-mode .bg-zinc-900,
    .light-mode .bg-zinc-950,
    .light-mode .bg-\[\#0a0a0a\] {
      background-color: var(--bg-card) !important;
    }

    .light-mode .bg-zinc-800,
    .light-mode .bg-slate-800,
    .light-mode .bg-slate-900 {
      background-color: #f1f5f9 !important;
    }

    .light-mode .border-zinc-800,
    .light-mode .border-slate-800,
    .light-mode .border-slate-700,
    .light-mode .border-white\/5,
    .light-mode .border-white\/10 {
      border-color: var(--border-main) !important;
    }

    .light-mode .bg-white\/5,
    .light-mode .bg-white\/10 {
      background-color: rgba(0, 0, 0, 0.05) !important;
    }

    /* Star underline hover effect for navbar links */
    .nav-star-link {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }
    .nav-star-link .star-underline {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0;
      pointer-events: none;
      opacity: 0;
      width: max-content;
    }
    .nav-star-link:hover .star-underline {
      opacity: 1;
    }
    .nav-star-link:hover .star-icon {
      animation: star-pop 0.8s ease forwards;
    }
    .nav-star-link:hover .star-line-left {
      animation: star-line 0.8s ease forwards;
      transform-origin: right center;
    }
    .nav-star-link:hover .star-line-right {
      animation: star-line 0.8s ease forwards;
      transform-origin: left center;
    }
    .star-line-left,
    .star-line-right {
      display: block;
      height: 1.5px;
      width: 32px;
      background: linear-gradient(to left, #10b981, transparent);
      transform: scaleX(0);
    }
    .star-line-right {
      background: linear-gradient(to right, #10b981, transparent);
    }
    .star-icon {
      font-size: 9px;
      line-height: 1;
      opacity: 0;
      color: #10b981;
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-main);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-main);
      border-radius: 3px;
    }
  </style>

{
  "imports": {
